services:
  db:
    image: postgres:16-alpine
    container_name: managers_sl_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-managers_sl}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-managers_sl}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: managers_sl_web
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    expose:
      - "8000"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.25-alpine
    container_name: managers_sl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge