version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: managers_sl_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5

  # ── Redis (брокер Celery) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: managers_sl_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── Django приложение ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: managers_sl_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn students_life.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --threads 2
               --worker-class gthread
               --timeout 120
               --access-logfile -
               --error-logfile -"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker (фоновые задачи) ──────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: managers_sl_celery
    restart: unless-stopped
    command: celery -A students_life worker -l info -c 2 -Q default
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - media_data:/app/media
    depends_on:
      - web
      - redis
    networks:
      - backend

  # ── Celery Beat (планировщик) ───────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: managers_sl_beat
    restart: unless-stopped
    command: celery -A students_life beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - web
      - redis
    networks:
      - backend

  # ── Nginx (reverse proxy + static) ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: managers_sl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - backend

  # ── Certbot (SSL — первый запуск вручную) ───────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: managers_sl_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Команда для первого получения сертификата (запустить вручную):
    # docker compose run --rm certbot certonly --webroot -w /var/www/certbot
    #   -d manager-sl.ru -d www.manager-sl.ru --email your@email.com --agree-tos
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --quiet --webroot -w /var/www/certbot;
               sleep 12h & wait $${!};
             done"
    networks:
      - backend

volumes:
  postgres_data:
  media_data:
  static_data:
  certbot_certs:
  certbot_www:

networks:
  backend:
    driver: bridge