# docker/nginx.conf

# Редирект HTTP → HTTPS
server {
    listen 80;
    server_name manager-sl.ru www.manager-sl.ru;
    return 301 https://$host$request_uri;
}

# HTTPS + проксирование на Gunicorn
server {
    listen 443 ssl http2;
    server_name manager-sl.ru www.manager-sl.ru;

    # SSL-сертификаты (Let's Encrypt, уже на сервере)
    ssl_certificate     /etc/letsencrypt/live/manager-sl.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manager-sl.ru/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Заголовки безопасности
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 50M;

    # Статика Django
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Медиафайлы
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Всё остальное → Gunicorn
    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}