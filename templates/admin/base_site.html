{% extends "unfold/layouts/base.html" %}

{% block extrahead %}
{{ block.super }}

<style>
    /* На мобилках приподнимаем контент админки, чтобы он не прятался под Tab Bar */
    @media (max-width: 768px) {
        main, #main-content, .flex-1.overflow-y-auto {
            padding-bottom: calc(85px + env(safe-area-inset-bottom)) !important;
        }
    }
</style>

<script>
    {% comment %} document.addEventListener('DOMContentLoaded', function() {
        // Если экран шире 768px (планшеты и десктопы) — ничего не делаем
        if (window.innerWidth > 768) return;

        // Создаем контейнер навигации (Tailwind классы от темы Unfold)
        const nav = document.createElement('nav');
        nav.className = 'fixed bottom-0 left-0 w-full z-[100] bg-white/85 dark:bg-gray-900/85 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] pb-[env(safe-area-inset-bottom)]';
        
        const currentPath = window.location.pathname;
        
        // 5 пунктов твоего меню (иконки взяты из Heroicons, как в Unfold)
        const tabs = [
            { 
                id: 'crm', name: 'Клиенты', url: '/admin/clients/client/', 
                icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" /></svg>' 
            },
            { 
                id: 'catalog', name: 'ВУЗы', url: '/admin/catalog/program/', 
                icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5" /></svg>' 
            },
            { 
                id: 'home', name: 'Главная', url: '/admin/', isCenter: true, 
                icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>' 
            },
            { 
                id: 'docs', name: 'Документы', url: '/admin/documents/generateddocument/', 
                icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>' 
            },
            { 
                id: 'profile', name: 'Профиль', url: '/admin/users/user/', 
                icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" /></svg>' 
            }
        ];

        let html = '<div class="flex justify-around items-center h-[70px] px-1">';
        
        tabs.forEach(tab => {
            // Логика подсветки активного таба
            const isActive = tab.id === 'home' 
                ? (currentPath === '/admin/' || currentPath === '/admin')
                : currentPath.startsWith(tab.url);
            
            if (tab.isCenter) {
                // Центральная парящая кнопка
                html += `
                <a href="${tab.url}" class="flex flex-col items-center justify-center relative -top-4 w-[20%]">
                    <div class="flex items-center justify-center w-14 h-14 rounded-full shadow-lg transition-transform active:scale-95 ${isActive ? 'bg-primary-700 text-white shadow-primary-500/40' : 'bg-primary-600 text-white shadow-primary-600/30'}">
                        ${tab.icon}
                    </div>
                    <span class="text-[10px] font-bold mt-1.5 text-primary-600 dark:text-primary-500">${tab.name}</span>
                </a>`;
            } else {
                // Обычные кнопки
                const colorClass = isActive 
                    ? 'text-primary-600 dark:text-primary-500' 
                    : 'text-gray-400 hover:text-gray-900 dark:text-gray-500 dark:hover:text-white';
                
                html += `
                <a href="${tab.url}" class="flex flex-col items-center justify-center w-[20%] h-full space-y-1.5 transition-colors active:opacity-50 ${colorClass}">
                    ${tab.icon}
                    <span class="text-[10px] font-semibold">${tab.name}</span>
                </a>`;
            }
        });
        
        html += '</div>';
        nav.innerHTML = html;
        
        // Вставляем меню прямо в body
        document.body.appendChild(nav);
    }); {% endcomment %}
</script>
{% endblock %}
